<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="../../assets/images/favicon.svg">
    <title>{{TITLE}} | Michael Giannakopoulos</title>
    <script>
        (function () {
            try {
                var t = localStorage.getItem('theme') || 'dark';
                document.documentElement.setAttribute('data-theme', t);
            } catch (e) {}
        })();
    </script>
    <style>
        html { background: #f5f6f9; color-scheme: light; }
        html[data-theme="dark"] { background: #282c34; color-scheme: dark; }
    </style>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700&family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=optional" rel="stylesheet">

    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='7' fill='%23ffffff'/><circle cx='16' cy='16' r='4' fill='%235b57eb'/></svg>">
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/blog.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism-themes/1.9.0/prism-one-dark.min.css" rel="stylesheet" />
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo"><a href="../index.html">MG</a></div>
            <div class="nav-right">
                <button class="theme-toggle" aria-label="Toggle dark mode" title="Toggle dark mode">
                    <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>
                    <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
                </button>
                <a href="../alpha_page/" class="blog-link">Alpha</a>
                <a href="../blog.html" class="blog-link active">Blog</a>
                <button class="mobile-menu-btn" aria-label="Open navigation menu">
                    <div class="burger-icon">
                        <div class="burger-line"></div>
                        <div class="burger-line"></div>
                        <div class="burger-line"></div>
                    </div>
                </button>
                <div class="nav-dropdown">
                    <ul class="nav-links">
                        <li><a href="../index.html#home">Home</a></li>
                        <li><a href="../index.html#about">About</a></li>
                        <li><a href="../index.html#experience">Experience</a></li>
                        <li><a href="../index.html#projects">Projects</a></li>
                        <li><a href="../index.html#competitions">Competitions</a></li>
                        <li><a href="../index.html#education">Education</a></li>
                        <li><a href="../index.html#contact">Contact</a></li>
                    </ul>
                </div>
            </div>
        </div>
    </nav>

    <!-- Post Content -->
    <main class="post-container">
        <div class="container">
            <article class="blog-post">
                <header class="post-header">
                    <div class="post-meta">
                        <span class="post-date">{{DATE}}</span>
                        <span class="post-separator">/</span>
                        <span class="post-category">{{CATEGORY}}</span>
                    </div>
                    <h1 class="post-title">{{TITLE}}</h1>
                </header>

                <div class="post-content">
                    {{CONTENT}}
                </div>
            </article>

            <footer class="post-footer">
                <a href="../blog.html" class="back-to-blog"><span class="arrow">←</span> Back to all posts</a>
            </footer>
        </div>
    </main>

    <!-- Footer -->
    <footer>
        <div class="container">
            <p>© {{YEAR}} Michael Jason Giannakopoulos — built &amp; designed from scratch.</p>
        </div>
    </footer>

    <!-- JavaScript -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-core.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/autoloader/prism-autoloader.min.js"></script>
    <script src="../js/main.js"></script>
    <script src="../js/blog.js"></script>
</body>
</html>
